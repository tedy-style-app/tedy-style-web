name: TedyStyle Web CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REPO_NAME: ${{ github.repository }}
  REGISTRY: ghcr.io
  SSH_HOST: ${{ secrets.SERVER_IP }}
  SSH_USER: ${{ secrets.SERVER_USERNAME }}
  SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  # SSH port is not sensitive — hardcoded (server listens on 22).
  SSH_PORT: "22"
  # Host port the web container binds to (localhost only). The host nginx
  # for sevil.app proxies "/" here and "/api" to the backend on 8086.
  HOST_PORT: 8087

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lowercase repo name
        id: repo
        run: echo "name=${REPO_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.7.1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # amd64 only — the server is an x86_64 VM, so no ARM64/QEMU
      # emulation. That keeps this build fast (no slow cross-compile).
      - name: Build and push Docker image
        uses: docker/build-push-action@v6.9.0
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:buildcache,mode=max

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Lowercase repo name
        id: repo
        run: echo "name=${REPO_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: SSH deploy (docker compose)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: "${{ env.SSH_HOST }}"
          username: "${{ env.SSH_USER }}"
          key: "${{ env.SSH_KEY }}"
          port: "${{ env.SSH_PORT }}"
          envs: GHCR_USER,GHCR_TOKEN,IMAGE,HOST_PORT
          script: |
            set -e

            # GHCR login for pulling the image.
            echo "${GHCR_TOKEN}" | docker login -u "${GHCR_USER}" --password-stdin ghcr.io

            # Self-contained compose in its own dir. The web container binds
            # to localhost only; the host nginx is the public entrypoint.
            mkdir -p ~/teddy2-web
            cat > ~/teddy2-web/docker-compose.yml <<EOF
            services:
              teddy2-web:
                image: ${IMAGE}
                container_name: teddy2-web
                restart: unless-stopped
                ports:
                  - "127.0.0.1:${HOST_PORT}:80"
            EOF

            docker pull "${IMAGE}"

            cd ~/teddy2-web
            docker compose up -d --remove-orphans

            # Drop images older than 7 days.
            docker image prune -a -f --filter "until=168h" >/dev/null

            # Smoke test — fail the deploy if the container doesn't serve.
            sleep 5
            curl --fail --silent --show-error "http://localhost:${HOST_PORT}/" >/dev/null
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:${{ github.sha }}
          HOST_PORT: ${{ env.HOST_PORT }}
