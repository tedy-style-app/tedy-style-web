server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # iOS/Android deep-link association files — serve as JSON, no extension.
    location = /.well-known/apple-app-site-association {
        default_type application/json;
    }
    location = /.well-known/assetlinks.json {
        default_type application/json;
    }

    # Hashed build assets — cache hard.
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|webp|svg)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached so new deploys are picked up.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback — /admin, /s/<id>, etc. resolve in the browser.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
